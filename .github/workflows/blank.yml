name: Build Deepin OS .deb Package (Flet Build)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-deb:
    runs-on: ubuntu-22.04 # Environnement Debian/Ubuntu pour cibler Deepin

    steps:
    - name: Checkout du code
      uses: actions/checkout@v4

    - name: Installation de Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Installation des dépendances système pour Flet Linux
      # Flet utilise Flutter en arrière-plan, qui nécessite GTK et des outils de build C++
      run: |
        sudo apt-get update
        sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev fakeroot

    - name: Installation de Flet
      run: |
        python -m pip install --upgrade pip
        pip install flet

    - name: Compilation avec Flet Build
      # La commande officielle Flet. On donne un nom strict au binaire généré.
      run: |
        flet build linux --project-name shellino_moviebox

    - name: Préparation de la structure du fichier .deb
      run: |
        # Création de l'arborescence standard Linux
        mkdir -p build_deb/DEBIAN
        mkdir -p build_deb/opt/shellino-moviebox
        mkdir -p build_deb/usr/bin
        mkdir -p build_deb/usr/share/applications

        # 1. Copier le résultat de `flet build linux` (qui se trouve dans build/linux/)
        # Le dossier contient l'exécutable natif et le dossier /data (fichiers Python et assets)
        cp -a build/linux/* build_deb/opt/shellino-moviebox/

        # 2. Créer un raccourci exécutable dans /usr/bin/ pour le lancer depuis le terminal
        ln -s /opt/shellino-moviebox/shellino_moviebox build_deb/usr/bin/shellino-moviebox

        # 3. Créer le fichier de configuration (Control)
        # /!\ On indique "Depends: adb" pour que Deepin installe ADB tout seul !
        cat <<EOF > build_deb/DEBIAN/control
        Package: shellino-moviebox
        Version: 1.0.0
        Section: utils
        Priority: optional
        Architecture: amd64
        Depends: adb
        Maintainer: Shellino <contact@votredomaine.com>
        Description: Shellino MovieBox Recovery
         Application de recuperation et gestion de fichiers Android via ADB.
         Compilee nativement avec Flet et Flutter.
        EOF

        # 4. Créer le raccourci pour le lanceur d'application de Deepin
        cat <<EOF > build_deb/usr/share/applications/shellino-moviebox.desktop
        [Desktop Entry]
        Name=Shellino MovieBox
        Comment=Gérer vos fichiers Android via ADB
        Exec=/opt/shellino-moviebox/shellino_moviebox
        Icon=folder-download
        Terminal=false
        Type=Application
        Categories=Utility;System;
        EOF

        # 5. Fixer les permissions pour respecter les normes Debian
        chmod -R 755 build_deb
        chmod 755 build_deb/DEBIAN/control

    - name: Construction du paquet .deb
      run: |
        # fakeroot permet de créer le .deb avec des permissions "root" à l'intérieur
        fakeroot dpkg-deb --build build_deb shellino-moviebox_1.0.0_amd64.deb

    - name: Upload de l'artefact .deb
      uses: actions/upload-artifact@v4
      with:
        name: shellino-moviebox-deepin
        path: shellino-moviebox_1.0.0_amd64.deb
